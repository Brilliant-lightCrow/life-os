<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#111111">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Life OS">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Life OS</title>
<style>
:root{--bg:#111;--surface:#1a1a1a;--card:#1e1e1e;--border:rgba(255,255,255,0.08);--text:#f0f0f0;--muted:#777;--hint:#444;--blue:#4f9cf9;--green:#4ade80;--amber:#f59e0b;--purple:#a78bfa;--red:#f87171;--r:12px;--rs:8px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);overscroll-behavior:none;}
body{display:flex;flex-direction:column;max-width:500px;margin:0 auto;position:relative;}

/* ── Header ── */
.hdr{padding:16px 16px 10px;padding-top:calc(16px + env(safe-area-inset-top));background:var(--bg);position:sticky;top:0;z-index:50;border-bottom:0.5px solid var(--border);}
.hdr-top{display:flex;justify-content:space-between;align-items:baseline;}
.app-name{font-size:22px;font-weight:700;letter-spacing:-0.5px;background:linear-gradient(90deg,#4f9cf9,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hdr-date{font-size:12px;color:var(--muted);}
.pills{display:flex;gap:6px;margin-top:10px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;}
.pills::-webkit-scrollbar{display:none;}
.pill{background:var(--surface);border-radius:20px;padding:4px 11px;font-size:12px;color:var(--muted);white-space:nowrap;flex-shrink:0;border:0.5px solid var(--border);}
.pill b{font-weight:600;color:var(--text);margin-left:3px;}

/* ── Main ── */
main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.screen{display:none;padding:14px 14px 110px;}
.screen.active{display:block;}

/* ── Bottom Nav ── */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:500px;background:rgba(17,17,17,0.95);backdrop-filter:blur(12px);border-top:0.5px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom);z-index:50;}
.nbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:10px 0;border:none;background:none;color:var(--hint);font-size:10px;cursor:pointer;font-family:inherit;transition:color .15s;}
.nbtn.active{color:var(--blue);}
.nbtn svg{width:22px;height:22px;stroke-width:1.8;}

/* ── Cards ── */
.card{background:var(--card);border-radius:var(--r);padding:15px;margin-bottom:10px;border:0.5px solid var(--border);}
.lbl{font-size:11px;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;margin-bottom:11px;}

/* ── Buttons ── */
.btn{padding:12px 22px;border-radius:100px;border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .15s,transform .1s;}
.btn:active{transform:scale(0.96);}
.btn-p{background:var(--blue);color:#fff;}
.btn-g{background:var(--surface);color:var(--text);border:0.5px solid var(--border);}
.btn-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
select{background:var(--surface);color:var(--text);border:0.5px solid var(--border);border-radius:var(--rs);padding:9px 12px;font-size:14px;font-family:inherit;width:100%;margin-bottom:10px;outline:none;}
input[type=text],input[type=number]{background:var(--surface);color:var(--text);border:0.5px solid var(--border);border-radius:var(--rs);padding:10px 12px;font-size:14px;font-family:inherit;outline:none;width:100%;}
input:focus{border-color:var(--blue);}

/* ── Timer ── */
.timer-big{font-size:76px;font-weight:200;text-align:center;font-variant-numeric:tabular-nums;letter-spacing:-3px;margin:10px 0 4px;color:var(--text);}
.timer-status{font-size:13px;color:var(--muted);text-align:center;margin-bottom:16px;}
.sess-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid var(--border);font-size:13px;}
.sess-row:last-child{border-bottom:none;}
.sess-badge{background:rgba(79,156,249,.15);color:var(--blue);font-size:11px;padding:2px 8px;border-radius:10px;}
.delx{background:none;border:none;color:var(--hint);font-size:20px;cursor:pointer;line-height:1;padding:0 4px;transition:color .1s;}
.delx:active{color:var(--red);}
.empty{font-size:13px;color:var(--hint);padding:6px 0;}

/* ── Chart ── */
.chart-wrap{position:relative;width:100%;}
.chart-legend{display:flex;gap:14px;margin-bottom:8px;font-size:12px;color:var(--muted);flex-wrap:wrap;}
.lg-dot{width:9px;height:9px;border-radius:2px;display:inline-block;margin-right:4px;vertical-align:middle;}

/* ── Habits ── */
.hab-row{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:0.5px solid var(--border);}
.hab-row:last-child{border-bottom:none;}
.hab-chk{width:22px;height:22px;border-radius:50%;border:2px solid var(--hint);background:none;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.hab-chk.done{background:var(--green);border-color:var(--green);}
.hab-chk.done::after{content:'';width:5px;height:9px;border:2px solid #000;border-top:none;border-left:none;transform:rotate(45deg) translate(-1px,-1px);display:block;}
.hab-name{flex:1;font-size:14px;}
.hab-name.done{text-decoration:line-through;color:var(--hint);}
.hab-dots{display:flex;gap:3px;}
.hdot{width:8px;height:8px;border-radius:2px;background:var(--hint);}
.hdot.on{background:var(--green);}
.add-row{display:flex;gap:8px;margin-top:12px;}
.add-btn{background:var(--blue);color:#fff;border:none;border-radius:var(--rs);padding:10px 16px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;}
.add-btn:active{opacity:.75;}

/* ── Health ── */
.hgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;}
.hfield{display:flex;flex-direction:column;gap:5px;}
.hfield label{font-size:11px;color:var(--muted);}
.save-btn{background:var(--blue);color:#fff;border:none;border-radius:var(--rs);padding:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;width:100%;transition:opacity .15s;}
.save-btn:active{opacity:.75;}

/* ── Checklist ── */
.dscroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none;margin-bottom:4px;}
.dscroll::-webkit-scrollbar{display:none;}
.dchip{padding:7px 15px;border-radius:100px;border:0.5px solid var(--border);background:none;color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;transition:all .15s;}
.dchip.active{background:var(--blue);color:#fff;border-color:transparent;}
.prog-wrap{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.prog-track{flex:1;height:3px;background:var(--surface);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:var(--blue);border-radius:2px;transition:width .3s;}
.prog-txt{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums;min-width:30px;text-align:right;}
.day-sub{font-size:12px;color:var(--muted);margin-bottom:12px;}
.cl-block{margin-bottom:8px;}
.blk-hdr{display:flex;align-items:center;gap:8px;padding:8px 11px;background:var(--surface);border-radius:var(--rs) var(--rs) 0 0;border:0.5px solid var(--border);border-bottom:none;}
.blk-time{font-size:10px;color:var(--muted);flex-shrink:0;font-variant-numeric:tabular-nums;}
.blk-title{font-size:12px;font-weight:500;flex:1;line-height:1.3;}
.blk-tag{font-size:10px;padding:2px 7px;border-radius:10px;flex-shrink:0;}
.tg{background:rgba(74,222,128,.12);color:#4ade80;}
.ta{background:rgba(79,156,249,.12);color:#4f9cf9;}
.tf{background:rgba(167,139,250,.12);color:#a78bfa;}
.tr{background:rgba(119,119,119,.12);color:#777;}
.tc{background:rgba(245,158,11,.12);color:#f59e0b;}
.blk-items{border:0.5px solid var(--border);border-top:none;border-radius:0 0 var(--rs) var(--rs);overflow:hidden;}
.chk-row{display:flex;align-items:flex-start;gap:10px;padding:9px 11px;border-bottom:0.5px solid var(--border);cursor:pointer;}
.chk-row:last-child{border-bottom:none;}
.chk-row input{margin-top:2px;accent-color:var(--blue);flex-shrink:0;width:14px;height:14px;cursor:pointer;}
.chk-row label{font-size:13px;line-height:1.5;cursor:pointer;}
.chk-row.done label{text-decoration:line-through;color:var(--hint);}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-top">
    <div class="app-name">Life OS</div>
    <div class="hdr-date" id="hdr-date"></div>
  </div>
  <div class="pills">
    <div class="pill">Focus<b id="m-focus">0 min</b></div>
    <div class="pill">Habits<b id="m-habits">0/0</b></div>
    <div class="pill">Streak<b id="m-streak">0d</b></div>
    <div class="pill">Sleep<b id="m-sleep">—</b></div>
  </div>
</header>

<main>
  <!-- FOCUS -->
  <div class="screen active" id="sc-focus">
    <div class="card">
      <select id="timer-preset" onchange="setPreset(this.value)">
        <option value="25">Pomodoro — 25 min</option>
        <option value="50">Deep work — 50 min</option>
        <option value="15">Short sprint — 15 min</option>
        <option value="5">Break — 5 min</option>
      </select>
      <div class="timer-big" id="timer-display">25:00</div>
      <div class="timer-status" id="timer-status">Ready</div>
      <div class="btn-row">
        <button class="btn btn-p" id="btn-start" onclick="toggleTimer()">Start</button>
        <button class="btn btn-g" onclick="resetTimer()">Reset</button>
        <button class="btn btn-p" id="btn-log" style="display:none" onclick="logSession()">Save</button>
      </div>
    </div>
    <div class="card">
      <div class="lbl">Focus this week</div>
      <div class="chart-wrap" style="height:155px"><canvas id="ch-focus"></canvas></div>
    </div>
    <div class="card">
      <div class="lbl">Recent sessions</div>
      <div id="sess-list"><p class="empty">No sessions yet — start your first one!</p></div>
    </div>
  </div>

  <!-- CHECKLIST -->
  <div class="screen" id="sc-checklist">
    <div class="dscroll" id="days-nav"></div>
    <div class="prog-wrap"><div class="prog-track"><div class="prog-fill" id="cl-fill" style="width:0%"></div></div><span class="prog-txt" id="cl-pct">0%</span></div>
    <div class="day-sub" id="cl-sub"></div>
    <div id="cl-blocks"></div>
  </div>

  <!-- HABITS -->
  <div class="screen" id="sc-habits">
    <div class="card">
      <div class="lbl">Today</div>
      <div id="hab-list"><p class="empty">No habits yet — add one below!</p></div>
      <div class="add-row">
        <input type="text" id="new-hab" placeholder="New habit..." onkeydown="if(event.key==='Enter')addHabit()">
        <button class="add-btn" onclick="addHabit()">Add</button>
      </div>
    </div>
    <div class="card">
      <div class="lbl">Completion — 7 days</div>
      <div class="chart-wrap" style="height:155px"><canvas id="ch-habits"></canvas></div>
    </div>
  </div>

  <!-- HEALTH -->
  <div class="screen" id="sc-health">
    <div class="card">
      <div class="lbl">Log today</div>
      <div class="hgrid">
        <div class="hfield"><label>Sleep (h)</label><input type="number" id="h-sleep" min="0" max="24" step="0.5" placeholder="7.5"></div>
        <div class="hfield"><label>Water (gl)</label><input type="number" id="h-water" min="0" max="30" placeholder="8"></div>
        <div class="hfield"><label>Steps</label><input type="number" id="h-steps" min="0" placeholder="8000"></div>
      </div>
      <button class="save-btn" id="health-btn" onclick="logHealth()">Save log</button>
    </div>
    <div class="card">
      <div class="lbl">Sleep & water — 7 days</div>
      <div class="chart-legend">
        <span><span class="lg-dot" style="background:#a78bfa"></span>Sleep (h, left axis)</span>
        <span><span class="lg-dot" style="background:#4ade80"></span>Water (glasses, right)</span>
      </div>
      <div class="chart-wrap" style="height:150px"><canvas id="ch-h1"></canvas></div>
    </div>
    <div class="card">
      <div class="lbl">Steps — 7 days</div>
      <div class="chart-wrap" style="height:150px"><canvas id="ch-h2"></canvas></div>
    </div>
  </div>
</main>

<nav class="bnav">
  <button class="nbtn active" onclick="showScreen('focus',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/></svg>Focus
  </button>
  <button class="nbtn" onclick="showScreen('checklist',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>Checklist
  </button>
  <button class="nbtn" onclick="showScreen('habits',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>Habits
  </button>
  <button class="nbtn" onclick="showScreen('health',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>Health
  </button>
</nav>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
// ── Utils ────────────────────────────────────────────────────────────
const todayStr=()=>new Date().toISOString().split('T')[0];
const last7=()=>{const d=[];for(let i=6;i>=0;i--){const dt=new Date();dt.setDate(dt.getDate()-i);d.push(dt.toISOString().split('T')[0]);}return d;};
const dayLbl=s=>new Date(s+'T12:00:00').toLocaleDateString('en',{weekday:'short'});
const ls={get:k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}},set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}};

// ── State ────────────────────────────────────────────────────────────
let focusSessions=ls.get('focus_sessions')||[];
let habits=ls.get('habits')||[];
let habitCompletions=ls.get('habit_completions')||[];
let healthLogs=ls.get('health_logs')||[];
let clState=ls.get('cl_state')||{};
let timerSecs=25*60,timerRunning=false,timerInterval=null,timerElapsed=0;
let activeDay=new Date().getDay()===0?6:new Date().getDay()-1;
let cFocus=null,cHabits=null,cH1=null,cH2=null;

// ── Header ───────────────────────────────────────────────────────────
document.getElementById('hdr-date').textContent=new Date().toLocaleDateString('en',{weekday:'short',month:'short',day:'numeric'});

function updateMetrics(){
  const t=todayStr();
  const fm=focusSessions.filter(s=>s.date===t).reduce((a,b)=>a+b.duration,0);
  document.getElementById('m-focus').textContent=fm+' min';
  const done=habitCompletions.filter(c=>c.date===t).length;
  document.getElementById('m-habits').textContent=done+'/'+habits.length;
  let streak=0;
  for(let i=0;i<60;i++){const dt=new Date();dt.setDate(dt.getDate()-i);const d=dt.toISOString().split('T')[0];if(habitCompletions.some(c=>c.date===d))streak++;else break;}
  document.getElementById('m-streak').textContent=streak+'d';
  const latest=[...healthLogs].sort((a,b)=>b.date.localeCompare(a.date))[0];
  document.getElementById('m-sleep').textContent=latest&&latest.sleep?(latest.sleep+'h'):'—';
}

// ── Navigation ───────────────────────────────────────────────────────
function showScreen(name,btn){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nbtn').forEach(b=>b.classList.remove('active'));
  document.getElementById('sc-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='focus'){renderSessList();renderFocusChart();}
  if(name==='habits'){renderHabits();renderHabitsChart();}
  if(name==='health'){prefillHealth();renderHealthCharts();}
  if(name==='checklist')renderChecklist();
}

// ── Timer ────────────────────────────────────────────────────────────
function updateTimerDisplay(){const m=Math.floor(timerSecs/60),s=timerSecs%60;document.getElementById('timer-display').textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;}
function setPreset(v){if(timerInterval){clearInterval(timerInterval);timerInterval=null;timerRunning=false;}timerSecs=parseInt(v)*60;timerElapsed=0;document.getElementById('btn-start').textContent='Start';document.getElementById('btn-log').style.display='none';document.getElementById('timer-status').textContent='Ready';updateTimerDisplay();}
function toggleTimer(){
  if(timerRunning){clearInterval(timerInterval);timerRunning=false;document.getElementById('btn-start').textContent='Resume';document.getElementById('timer-status').textContent='Paused';if(timerElapsed>0)document.getElementById('btn-log').style.display='';}
  else{timerRunning=true;document.getElementById('btn-start').textContent='Pause';document.getElementById('btn-log').style.display='none';document.getElementById('timer-status').textContent='In session...';timerInterval=setInterval(()=>{timerSecs--;timerElapsed++;updateTimerDisplay();if(timerSecs<=0){clearInterval(timerInterval);timerRunning=false;document.getElementById('btn-start').textContent='Start';document.getElementById('btn-log').style.display='';document.getElementById('timer-status').textContent='Done! 🎯';document.getElementById('timer-display').textContent='00:00';}},1000);}
}
function resetTimer(){clearInterval(timerInterval);timerRunning=false;timerElapsed=0;const v=document.getElementById('timer-preset').value;timerSecs=parseInt(v)*60;document.getElementById('btn-start').textContent='Start';document.getElementById('btn-log').style.display='none';document.getElementById('timer-status').textContent='Ready';updateTimerDisplay();}
function logSession(){const mins=Math.round(timerElapsed/60);if(mins<1)return;const sel=document.getElementById('timer-preset');const label=sel.options[sel.selectedIndex].text.split(' — ')[0];focusSessions.push({id:Date.now(),date:todayStr(),duration:mins,label});ls.set('focus_sessions',focusSessions);resetTimer();updateMetrics();renderSessList();renderFocusChart();}
function renderSessList(){const el=document.getElementById('sess-list');const recent=[...focusSessions].sort((a,b)=>b.id-a.id).slice(0,6);if(!recent.length){el.innerHTML='<p class="empty">No sessions yet — start your first one!</p>';return;}el.innerHTML=recent.map(s=>`<div class="sess-row"><span style="color:var(--muted);font-size:11px">${s.date===todayStr()?'Today':s.date}</span><span style="flex:1;padding-left:8px">${s.label}</span><span class="sess-badge">${s.duration} min</span><button class="delx" onclick="delSess(${s.id})">×</button></div>`).join('');}
function delSess(id){focusSessions=focusSessions.filter(s=>s.id!==id);ls.set('focus_sessions',focusSessions);updateMetrics();renderSessList();renderFocusChart();}
function renderFocusChart(){const days=last7(),data=days.map(d=>focusSessions.filter(s=>s.date===d).reduce((a,b)=>a+b.duration,0));const ctx=document.getElementById('ch-focus');if(!ctx)return;if(cFocus)cFocus.destroy();cFocus=new Chart(ctx,{type:'bar',data:{labels:days.map(dayLbl),datasets:[{data,backgroundColor:'#4f9cf9',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#555',font:{size:11}}},x:{grid:{display:false},ticks:{color:'#555',font:{size:11},autoSkip:false}}}}});}

// ── Habits ───────────────────────────────────────────────────────────
function addHabit(){const inp=document.getElementById('new-hab');const name=inp.value.trim();if(!name)return;habits.push({id:Date.now(),name});ls.set('habits',habits);inp.value='';updateMetrics();renderHabits();renderHabitsChart();}
function toggleHabit(id){const t=todayStr();const idx=habitCompletions.findIndex(c=>c.habitId===id&&c.date===t);if(idx>=0)habitCompletions.splice(idx,1);else habitCompletions.push({habitId:id,date:t});ls.set('habit_completions',habitCompletions);updateMetrics();renderHabits();renderHabitsChart();}
function delHabit(id){habits=habits.filter(h=>h.id!==id);habitCompletions=habitCompletions.filter(c=>c.habitId!==id);ls.set('habits',habits);ls.set('habit_completions',habitCompletions);updateMetrics();renderHabits();renderHabitsChart();}
function renderHabits(){const el=document.getElementById('hab-list');if(!habits.length){el.innerHTML='<p class="empty">No habits yet — add one below!</p>';return;}const t=todayStr(),days=last7();el.innerHTML=habits.map(h=>{const done=habitCompletions.some(c=>c.habitId===h.id&&c.date===t);const dots=days.map(d=>`<div class="hdot${habitCompletions.some(c=>c.habitId===h.id&&c.date===d)?' on':''}"></div>`).join('');return`<div class="hab-row"><div class="hab-chk${done?' done':''}" onclick="toggleHabit(${h.id})"></div><span class="hab-name${done?' done':''}">${h.name}</span><div class="hab-dots">${dots}</div><button class="delx" onclick="delHabit(${h.id})">×</button></div>`;}).join('');}
function renderHabitsChart(){const days=last7(),data=days.map(d=>{if(!habits.length)return 0;const n=habits.filter(h=>habitCompletions.some(c=>c.habitId===h.id&&c.date===d)).length;return Math.round((n/habits.length)*100);});const ctx=document.getElementById('ch-habits');if(!ctx)return;if(cHabits)cHabits.destroy();cHabits=new Chart(ctx,{type:'bar',data:{labels:days.map(dayLbl),datasets:[{data,backgroundColor:'#4ade80',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,max:100,grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#555',font:{size:11},callback:v=>v+'%'}},x:{grid:{display:false},ticks:{color:'#555',font:{size:11},autoSkip:false}}}}});}

// ── Health ───────────────────────────────────────────────────────────
function prefillHealth(){const log=healthLogs.find(l=>l.date===todayStr());if(!log)return;if(log.sleep)document.getElementById('h-sleep').value=log.sleep;if(log.water)document.getElementById('h-water').value=log.water;if(log.steps)document.getElementById('h-steps').value=log.steps;}
function logHealth(){const sleep=parseFloat(document.getElementById('h-sleep').value)||null,water=parseInt(document.getElementById('h-water').value)||null,steps=parseInt(document.getElementById('h-steps').value)||null;if(!sleep&&!water&&!steps)return;const t=todayStr(),idx=healthLogs.findIndex(l=>l.date===t),entry={date:t,sleep,water,steps};if(idx>=0)healthLogs[idx]=entry;else healthLogs.push(entry);ls.set('health_logs',healthLogs);updateMetrics();renderHealthCharts();const btn=document.getElementById('health-btn');btn.textContent='Saved ✓';setTimeout(()=>{btn.textContent='Save log';},1500);}
function renderHealthCharts(){const days=last7(),labels=days.map(dayLbl),sd=days.map(d=>{const l=healthLogs.find(x=>x.date===d);return l?.sleep??null;}),wd=days.map(d=>{const l=healthLogs.find(x=>x.date===d);return l?.water??null;}),spd=days.map(d=>{const l=healthLogs.find(x=>x.date===d);return l?.steps??null;});const ctx1=document.getElementById('ch-h1');if(ctx1){if(cH1)cH1.destroy();cH1=new Chart(ctx1,{type:'line',data:{labels,datasets:[{label:'Sleep',data:sd,borderColor:'#a78bfa',backgroundColor:'rgba(167,139,250,.1)',tension:.3,yAxisID:'y1',spanGaps:true,pointRadius:4},{label:'Water',data:wd,borderColor:'#4ade80',backgroundColor:'rgba(74,222,128,.1)',tension:.3,yAxisID:'y2',spanGaps:true,pointRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y1:{beginAtZero:true,position:'left',grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#555',font:{size:11}}},y2:{beginAtZero:true,position:'right',grid:{display:false},ticks:{color:'#555',font:{size:11}}},x:{grid:{display:false},ticks:{color:'#555',font:{size:11},autoSkip:false}}}}});}const ctx2=document.getElementById('ch-h2');if(ctx2){if(cH2)cH2.destroy();cH2=new Chart(ctx2,{type:'bar',data:{labels,datasets:[{data:spd,backgroundColor:'#f59e0b',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#555',font:{size:11},callback:v=>v>=1000?(v/1000).toFixed(1)+'k':String(v)}},x:{grid:{display:false},ticks:{color:'#555',font:{size:11},autoSkip:false}}}}});}}

const TAG_MAP={tg:'Gym',ta:'Academic',tf:'Deep Work',tr:'Routine',tc:'Recovery'};

// ── Checklist ────────────────────────────────────────────────────────
function buildDayNav(){
  const nav=document.getElementById('days-nav');
  DAYS.forEach((d,i)=>{
    const btn=document.createElement('button');
    btn.className='dchip'+(i===activeDay?' active':'');
    btn.textContent=d.name.slice(0,3);
    btn.onclick=()=>{activeDay=i;renderChecklist();};
    nav.appendChild(btn);
  });
}

function renderChecklist(){
  document.querySelectorAll('.dchip').forEach((b,i)=>b.classList.toggle('active',i===activeDay));
  const day=DAYS[activeDay];
  document.getElementById('cl-sub').textContent=day.sub;
  let html='';
  day.blocks.forEach((b,bi)=>{
    html+=`<div class="cl-block"><div class="blk-hdr"><span class="blk-time">${b.t}</span><span class="blk-title">${b.ti}</span><span class="blk-tag ${b.tag}">${TAG_MAP[b.tag]}</span></div><div class="blk-items">`;
    b.items.forEach((item,ii)=>{
      const key=`cl_${activeDay}_${bi}_${ii}`;
      const chk=clState[key]||false;
      html+=`<div class="chk-row${chk?' done':''}" id="cr-${key}"><input type="checkbox" id="${key}" ${chk?'checked':''} onchange="tickCL(this,'${key}')"><label for="${key}">${item}</label></div>`;
    });
    html+='</div></div>';
  });
  document.getElementById('cl-blocks').innerHTML=html;
  updateCLProg();
}

function tickCL(el,key){
  clState[key]=el.checked;ls.set('cl_state',clState);
  const row=document.getElementById('cr-'+key);
  el.checked?row.classList.add('done'):row.classList.remove('done');
  updateCLProg();
}

function updateCLProg(){
  const day=DAYS[activeDay];let total=0,done=0;
  day.blocks.forEach((b,bi)=>b.items.forEach((_,ii)=>{const key=`cl_${activeDay}_${bi}_${ii}`;total++;if(clState[key])done++;}));
  const pct=total?Math.round((done/total)*100):0;
  document.getElementById('cl-fill').style.width=pct+'%';
  document.getElementById('cl-pct').textContent=pct+'%';
}
